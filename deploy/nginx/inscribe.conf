# Rate limiting zones (defined in http context via include or top-level nginx.conf)
# If you use this file as a standalone vhost, move these to /etc/nginx/nginx.conf http block.
# Keeping them here for portability with include-based setups.

# General: 20 req/s per IP burst to 50
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
# Auth: 5 req/s per IP burst to 10 — tighter window for login endpoint
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
# Search: 10 req/s per IP
limit_req_zone $binary_remote_addr zone=search:10m rate=10r/s;

# Connection limit: max 50 simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/inscribe.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inscribe.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

    # Reuse SSL sessions — reduces TLS handshake CPU cost significantly
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — enforce HTTPS for 1 year (including subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Limit request body size (Markdown + metadata — 4 MB is ample)
    client_max_body_size 4m;
    client_body_timeout 15s;
    client_header_timeout 15s;

    # Drop slow clients that don't send headers in time
    send_timeout 15s;

    # Keep connections alive to reduce TCP overhead
    keepalive_timeout 65s;
    keepalive_requests 200;

    # Connection limit per IP
    limit_conn conn_limit 50;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;

    # Static assets — immutable cache, no rate limiting needed
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Admin login — strictest rate limit
    location /admin/login {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Search API — separate zone
    location /api/search {
        limit_req zone=search burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other routes
    location / {
        limit_req zone=general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffers 8 16k;
        proxy_buffer_size 32k;

        # Proxy timeouts — don't hang on slow upstream
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
