services:
  inscribe:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    container_name: inscribe-app
    restart: always
    ports:
      - "${INSCRIBE_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - ../.env.production
    volumes:
      - inscribe_data:/app/data
    networks:
      - inscribe_net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  inscribe_data:

networks:
  inscribe_net:
    driver: bridge
